<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950">
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold">
    Data Flow with M05 Improvements
  </text>
  
  <!-- Step 1: Input -->
  <rect x="400" y="70" width="400" height="70" fill="#BBDEFB" stroke="#1976D2" stroke-width="2" rx="5"/>
  <text x="600" y="95" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">1. User Query</text>
  <text x="600" y="115" text-anchor="middle" font-family="Arial" font-size="12">"What catastrophe events most impacted Chubb's reserves in 2024?"</text>
  <text x="600" y="132" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Cross-carrier comparison query</text>
  
  <path d="M 600 140 L 600 170" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- M05 Step: Query Expansion -->
  <rect x="400" y="170" width="400" height="90" fill="#FFD54F" stroke="#FF6F00" stroke-width="3" rx="5"/>
  <text x="600" y="195" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">2. M05: Query Expansion</text>
  <text x="600" y="218" text-anchor="middle" font-family="Arial" font-size="11">Original: "catastrophe events"</text>
  <text x="600" y="238" text-anchor="middle" font-family="Arial" font-size="11">Expanded: "catastrophe CAT natural disaster major event hurricane"</text>
  <text x="600" y="253" text-anchor="middle" font-family="Arial" font-size="10" fill="#E65100">Actuarial synonym mapping (50+ terms)</text>
  
  <path d="M 600 260 L 600 290" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Step 3: Orchestrator -->
  <rect x="400" y="290" width="400" height="70" fill="#FFCC80" stroke="#F57C00" stroke-width="2" rx="5"/>
  <text x="600" y="315" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">3. Orchestrator</text>
  <text x="600" y="335" text-anchor="middle" font-family="Arial" font-size="11">Detects: Multi-company query → Use balanced search</text>
  <text x="600" y="352" text-anchor="middle" font-family="Arial" font-size="11">Needs: Financial tables + Narrative context</text>
  
  <path d="M 600 360 L 600 390" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- M05 Step: Balanced Retrieval -->
  <rect x="400" y="390" width="400" height="110" fill="#FFD54F" stroke="#FF6F00" stroke-width="3" rx="5"/>
  <text x="600" y="415" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">4. M05: Balanced Multi-Company Search</text>
  <text x="600" y="438" text-anchor="middle" font-family="Arial" font-size="11">Search QDrant with expanded query:</text>
  <text x="600" y="458" text-anchor="middle" font-family="Arial" font-size="11">• Top 2 from AIG  •  Top 2 from Travelers  •  Top 2 from Chubb</text>
  <text x="600" y="478" text-anchor="middle" font-family="Arial" font-size="11">Rerank by relevance → Return top 5 overall</text>
  <text x="600" y="493" text-anchor="middle" font-family="Arial" font-size="10" fill="#E65100">Prevents single-carrier dominance</text>
  
  <!-- Query arrows to databases -->
  <path d="M 400 450 L 220 550" stroke="#FF6F00" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arr2)"/>
  <text x="280" y="490" font-family="Arial" font-size="10" fill="#FF6F00">Expanded query</text>
  
  <path d="M 800 450 L 980 550" stroke="#FF6F00" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arr2)"/>
  <text x="860" y="490" font-family="Arial" font-size="10" fill="#FF6F00">Table query</text>
  
  <path d="M 600 500 L 600 540" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Database Results -->
  <rect x="50" y="540" width="280" height="100" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
  <text x="190" y="565" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">QDrant Results</text>
  <text x="190" y="588" text-anchor="middle" font-family="Arial" font-size="11">5 balanced chunks:</text>
  <text x="190" y="608" text-anchor="middle" font-family="Arial" font-size="11">2 AIG, 2 Travelers, 1 Chubb</text>
  <text x="190" y="625" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">All mention CAT/hurricane</text>
  
  <rect x="870" y="540" width="280" height="100" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="5"/>
  <text x="1010" y="565" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">PostgreSQL Results</text>
  <text x="1010" y="588" text-anchor="middle" font-family="Arial" font-size="11">3 financial tables:</text>
  <text x="1010" y="608" text-anchor="middle" font-family="Arial" font-size="11">CAT loss reserves by event</text>
  <text x="1010" y="625" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Structured data</text>
  
  <!-- Merge results -->
  <path d="M 330 590 L 550 660" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 870 590 L 650 660" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Context Assembly -->
  <rect x="400" y="660" width="400" height="80" fill="#FFB74D" stroke="#F57C00" stroke-width="2" rx="5"/>
  <text x="600" y="685" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">5. Context Assembly</text>
  <text x="600" y="708" text-anchor="middle" font-family="Arial" font-size="11">Combine: 5 balanced narrative chunks + 3 tables</text>
  <text x="600" y="728" text-anchor="middle" font-family="Arial" font-size="11">All 3 carriers represented in context</text>
  
  <path d="M 600 740 L 600 770" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- LLM Synthesis -->
  <rect x="400" y="770" width="400" height="80" fill="#FF9800" stroke="#E65100" stroke-width="2" rx="5"/>
  <text x="600" y="795" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">6. Claude Sonnet 4 Synthesis</text>
  <text x="600" y="818" text-anchor="middle" font-family="Arial" font-size="11">Generate comprehensive answer comparing all 3 carriers</text>
  <text x="600" y="838" text-anchor="middle" font-family="Arial" font-size="11">Include citations to sources</text>
  
  <path d="M 600 850 L 600 880" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Response -->
  <rect x="400" y="880" width="400" height="50" fill="#C8E6C9" stroke="#388E3C" stroke-width="2" rx="5"/>
  <text x="600" y="912" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">7. Response with Citations</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF6F00"/>
    </marker>
  </defs>
  
  <!-- M05 Impact Box -->
  <rect x="50" y="50" width="300" height="100" fill="#FFF3E0" stroke="#FF6F00" stroke-width="2" rx="5"/>
  <text x="70" y="75" font-family="Arial" font-size="13" font-weight="bold" fill="#E65100">M05 Improvements</text>
  <text x="70" y="95" font-family="Arial" font-size="11">Step 2: Query Expansion</text>
  <text x="70" y="113" font-family="Arial" font-size="11">Step 4: Balanced Retrieval</text>
  <text x="70" y="131" font-family="Arial" font-size="10" fill="#666">Result: 87.1/100 (+1.4 points)</text>
</svg>