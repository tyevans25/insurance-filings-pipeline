version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: insurance_filings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pipeline_network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - pipeline_network

  pipeline:
    build: .
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: insurance_filings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./data/output:/data/output  # Only mount output
    depends_on:
      - postgres
      - qdrant
    networks:
      - pipeline_network
    command: python /app/pipeline/run_ingest.py

volumes:
  postgres_data:
  qdrant_data:

networks:
  pipeline_network:
    driver: bridge