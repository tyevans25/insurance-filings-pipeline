version: '3.8'

services:
  # PostgreSQL for metadata and structured data
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: insurance_filings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pipeline_network

  # QDrant for vector embeddings
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - pipeline_network

  # Neo4j for knowledge graph (optional)
  neo4j:
    image: neo4j:5.13
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    networks:
      - pipeline_network

  # Pipeline application
  pipeline:
    build: .
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: insurance_filings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      INPUT_DIR: /data/raw
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/data
      - ./src:/app/src
    depends_on:
      - postgres
      - qdrant
    networks:
      - pipeline_network
    command: python /app/src/main.py

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:

networks:
  pipeline_network:
    driver: bridge